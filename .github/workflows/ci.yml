name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint · Typecheck · Build
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v6

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Format check
        run: pnpm format:check

      - name: Lint
        run: pnpm lint

      - name: i18n key parity (fr/en/ln)
        run: pnpm i18n:check

      - name: CSS custom properties (no self-references)
        run: pnpm css:check

      - name: Typecheck
        run: pnpm typecheck

      - name: Build
        run: pnpm build
        env:
          # Build à blanc : aucune valeur réelle nécessaire (§ src/lib/env.ts,
          # toutes les intégrations tierces sont optionnelles tant qu'elles
          # ne sont pas provisionnées).
          NEXT_PUBLIC_SITE_URL: https://www.sterkterecords.com
